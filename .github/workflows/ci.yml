name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest -q

  smoke-arm:
    name: ARM64 smoke (QEMU)
    runs-on: ubuntu-24.04
    needs: [test-ubuntu]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up buildx
        uses: docker/setup-buildx-action@v2
      - name: Build ARM64 smoke image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile.smoke \
            -t fourwheel-smoke:arm64 \
            --load .
      - name: Run smoke tests in container
        run: docker run --rm fourwheel-smoke:arm64
      - name: Note about time
        run: echo "ARM/QEMU jobs run under emulation and can be slow; use sparingly."

